name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet numpy matplotlib
    
    - name: Build APK (non-interactive)
      run: |
        export FLUTTER_ROOT=/opt/hostedtoolcache/flutter/stable-3.22.0-x64/flutter
        flet build apk app.py --yes
      env:
        FLUTTER_ROOT: /opt/hostedtoolcache/flutter/stable-3.22.0-x64/flutter
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Science-En-Une-App
        path: build/apk/*.apk.apk
